name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      # Dummy values — the app renders dynamically and tests mock Prisma, so no
      # real database or secrets are needed. These only satisfy module-load env reads.
      DATABASE_URL: postgresql://user:password@localhost:5432/classic_ci
      DEV_DATABASE_URL: postgresql://user:password@localhost:5432/classic_ci
      JWT_SECRET: ci-testing-secret-at-least-32-characters-long-000
      ANTHROPIC_API_KEY: sk-ant-ci-dummy-key
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      STRIPE_SECRET_KEY: sk_test_ci_dummy
      STRIPE_WEBHOOK_SECRET: whsec_ci_dummy
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_dummy
      BLOB_READ_WRITE_TOKEN: vercel_blob_rw_ci_dummy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build
